name: Scraper Leilões Caixa

on:
  schedule:
    # 6 execuções/dia, a cada 4h (cada run pega um IP novo → ~130 detalhes/run).
    # Minuto 17 (não :00) para evitar o congestionamento de agendamentos do GitHub.
    # OBS: o gatilho confiável é o croner do Railway (workflow_dispatch); este cron é fallback.
    - cron: '17 */4 * * *'
  workflow_dispatch:
    inputs:
      numero:
        description: 'Enriquecer só este imóvel (número da Caixa). Vazio = run normal (CSV + lote).'
        required: false
        default: ''

# Runs normais compartilham o grupo (serializa). Run de imóvel único usa grupo próprio
# para rodar na hora, sem ficar na fila atrás de um run em andamento.
concurrency:
  group: ${{ github.event.inputs.numero && format('scraper-single-{0}', github.event.inputs.numero) || 'scraper-leiloes' }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar Camoufox (Firefox stealth)
        run: |
          set +e
          # O navegador baixa primeiro; a base GeoIP (servidor de terceiros P3TERX) às vezes dá 500.
          # Não usamos geoip em runtime, então retentamos e toleramos a falha do MMDB.
          for attempt in 1 2 3; do
            python -m camoufox fetch && { echo "Camoufox OK na tentativa $attempt"; exit 0; }
            echo "::warning::Tentativa $attempt do fetch falhou (provavelmente MMDB geoip). Retry em 20s..."
            sleep 20
          done
          echo "::warning::MMDB geoip indisponível após 3 tentativas — seguindo (geoip não é usado em runtime)."
          exit 0

      - name: Rodar scraper
        env:
          OLANCE_URL: ${{ secrets.OLANCE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BATCH_SIZE: '130'
          HEADLESS: 'true'
          TARGET_NUMERO: ${{ github.event.inputs.numero }}
        run: xvfb-run -a python -m scraper.main
