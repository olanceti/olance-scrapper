name: Scraper Leilões Caixa

on:
  schedule:
    # 6 execuções/dia, a cada 4h (cada run pega um IP novo → ~130 detalhes/run).
    # Minuto 17 (não :00) para evitar o congestionamento de agendamentos do GitHub.
    - cron: '17 */4 * * *'
  workflow_dispatch:

# Evita execuções sobrepostas se uma demorar mais que o intervalo
concurrency:
  group: scraper-leiloes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar Camoufox (Firefox stealth)
        run: python -m camoufox fetch

      - name: Rodar scraper
        env:
          OLANCE_URL: ${{ secrets.OLANCE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BATCH_SIZE: '130'
          HEADLESS: 'true'
        run: xvfb-run -a python -m scraper.main
