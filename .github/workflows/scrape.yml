name: Scraper Leilões Caixa

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 03:00 BRT
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar Camoufox (Firefox stealth)
        run: python -m camoufox fetch

      - name: Rodar scraper
        env:
          OLANCE_URL: ${{ secrets.OLANCE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BATCH_SIZE: '300'
          HEADLESS: 'true'
        run: xvfb-run -a python -m scraper.main
